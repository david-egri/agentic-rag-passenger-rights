# Central configuration. All runtime knobs live here — never hardcode in code.
# Any value can be overridden by an environment variable (see src/config.py for
# the mapping, e.g. LLM_BACKEND, MODEL, OLLAMA_URL, TOP_K). Env wins over file.

# --- LLM (Phase 1) ---
llm_backend: ollama          # pluggable seam; only `ollama` is wired (see DECISIONS drop-dummy-llm)
model: qwen2.5:3b-instruct   # local Ollama tag (see DECISIONS llm-model)
ollama_url: http://localhost:11434
temperature: 0               # determinism (reproducibility non-negotiable)

# --- Retrieval / RAG (Phase 2 — placeholders so config stays stable) ---
embedding_model: BAAI/bge-small-en-v1.5
top_k: 4
rewrite_max_retries: 1       # bounded corrective-RAG rewrite loop
chroma_dir: data/chroma
corpus_dir: data/corpus
